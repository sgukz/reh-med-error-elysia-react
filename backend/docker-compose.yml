services:
  rehAPIMedError:
    image: sgukz/api-med-error-prod:1.11.0
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT-8003}:${PORT-8003}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
